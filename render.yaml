services:
  - type: web
    name: productivity-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: BCRYPT_SALT_ROUNDS
        value: 10
      - key: DATABASE_URL
        fromDatabase:
          name: productivity-backend-db
          property: connectionString

databases:
  - name: productivity-backend-db
    plan: free
    databaseName: production_shift_monitoring
    user: productivity_backend_user
